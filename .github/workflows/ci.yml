name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: ironsh/iron-proxy-action@v0.1.1
        with:
          egress-rules: egress-rules.yaml
          warn: "false"

      - run: uv sync
      - run: uv run pytest -v

      - name: Test that httpbin.org is blocked
        run: |
          echo "Attempting request to httpbin.org (should be blocked)..."
          if curl -sf --max-time 5 https://httpbin.org/get; then
            echo "FAIL: request to httpbin.org was NOT blocked"
            exit 1
          else
            echo "PASS: request to httpbin.org was blocked by Iron Proxy"
          fi

      - name: Test that raw IP address is blocked
        run: |
          echo "Attempting request to 8.8.8.8 (should be blocked)..."
          if curl -sf --max-time 5 http://8.8.8.8; then
            echo "FAIL: request to 8.8.8.8 was NOT blocked"
            exit 1
          else
            echo "PASS: request to 8.8.8.8 was blocked by Iron Proxy"
          fi

      - uses: ironsh/iron-proxy-action/summary@v0.1.1
        if: always()
